{% extends "base.html" %} {% block title %}도로 위험 신고 - ROADGUARD AI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
{% endblock %}

{% block content %}
<div class="report-wrapper">
    <header class="report-header">
        <h1><i class="fa-solid fa-triangle-exclamation"></i> ROADGUARD AI</h1>
        <p>AI 기반 도로 위험 요소 신고 시스템</p>
    </header>

    <form id="reportForm" action="{{ url_for('report.create_report') }}" method="POST" enctype="multipart/form-data">
        <section class="form-section">
            <h3><i class="fa-solid fa-camera"></i> 사진 및 영상 첨부</h3>
            <div id="drop-zone" class="upload-box">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>파일을 끌어다 놓거나 클릭하세요</p>
                <input type="file" id="fileInput" name="files" accept="image/*,video/*" hidden>
                <div id="file-preview" class="preview-container"></div>
            </div>
        </section>

        <section class="form-section">
            <h3><i class="fa-solid fa-location-dot"></i> 발생 위치</h3>
            <div class="location-group">
                <input type="text" id="location_text" name="location_text" placeholder="주소를 입력하거나 지도를 클릭하세요">
                <button type="button" id="openMapBtn" class="btn-secondary" onclick="openMapModal()">지도에서 선택하기</button>
            </div>
            <input type="hidden" id="latitude" name="latitude">
            <input type="hidden" id="longitude" name="longitude">
        </section>

        <section class="form-section">
            <h3><i class="fa-solid fa-pen-to-square"></i> 신고 정보</h3>
            <div class="input-group">
                <label>제목</label>
                <input type="text" name="title" required placeholder="예: 2차선 도로 낙하물 발견">
            </div>
            <div class="input-group">
                <label>상세 내용</label>
                <textarea name="content" id="content-area" rows="4" placeholder="상황을 상세히 적어주세요"></textarea>
            </div>
        </section>

        <button type="submit" class="btn-primary">신고 제출하기</button>
    </form>
</div>

<div id="mapModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h4><i class="fa-solid fa-map-location-dot"></i> 위치 선택</h4>
            <span class="close-modal" onclick="closeMapModal()">&times;</span>
        </div>
        <div id="map" style="width: 100%; height: 350px;"></div>

<div style="padding: 10px 20px 0 20px;">
    <button type="button" class="btn-secondary" style="width: 100%;" onclick="getCurrentLocation()">
        <i class="fa-solid fa-location-crosshairs"></i> 내 현재 위치 찾기
    </button>
</div>

<button type="button" id="confirmLocationBtn" class="btn-confirm-location" onclick="confirmLocation()">이 위치로 지정</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/report.js') }}"></script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLwEyP8KZVYo3D9MrJ09CEbPX_x7qHmcA&libraries=places&callback=initMap"></script>
{% endblock %}
